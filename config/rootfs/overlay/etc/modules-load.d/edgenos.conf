# EdgeNOS AS5610-52X kernel modules
# Loaded at boot by systemd-modules-load
# Order matters: BDE first, then platform, then peripherals

# Broadcom SDK interface
linux-kernel-bde
linux-user-bde

# TUN/TAP for packet I/O (52 switch ports)
tun

# Platform management
accton_as5610_52x_cpld

# I2C bus infrastructure (may be built-in)
i2c-mpc
i2c-mux-pca954x

# EEPROM drivers (board + 48 SFP + 4 QSFP)
at24
sff_8436_eeprom

# GPIO expanders (SFP TX disable, QSFP reset/lpmode)
gpio-pca953x

# Temperature sensors
max6697
adm1021

# Signal conditioning / retimers
ds100df410
