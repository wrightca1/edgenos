# EdgeNOS datapath configuration
# Buffer pools and QoS for BCM56846

# Priority groups
# control=7 (pool 1), service=2 (pool 2), lossless=3 (pool 3), bulk=0 (pool 0)

# Ingress service pools
ingress_service_pool.0.percent = 0.0
ingress_service_pool.1.percent = 3.0
ingress_service_pool.2.percent = 2.0
ingress_service_pool.3.percent = 1.0

# Egress service pools
egress_service_pool.0.percent = 45.0
egress_service_pool.1.percent = 90.0
egress_service_pool.2.percent = 90.0
egress_service_pool.3.percent = 90.0

# CoS to egress queue mapping
cos_egr_queue.cos_0.uc = 0
cos_egr_queue.cos_0.cpu = 0
cos_egr_queue.cos_1.uc = 1
cos_egr_queue.cos_1.cpu = 1
cos_egr_queue.cos_2.uc = 2
cos_egr_queue.cos_2.cpu = 2
cos_egr_queue.cos_3.uc = 3
cos_egr_queue.cos_3.cpu = 3
cos_egr_queue.cos_4.uc = 4
cos_egr_queue.cos_4.cpu = 4
cos_egr_queue.cos_5.uc = 5
cos_egr_queue.cos_5.cpu = 5
cos_egr_queue.cos_6.uc = 6
cos_egr_queue.cos_6.cpu = 6
cos_egr_queue.cos_7.uc = 7
cos_egr_queue.cos_7.cpu = 7

# DoS prevention (all disabled)
dos_prevention.sip_eq_dip = false
dos_prevention.smac_eq_dmac = false
dos_prevention.tcp_flags_syn_fin = false
dos_prevention.tcp_flags_fin_urg_psh = false
dos_prevention.tcp_flags_sequence_zero = false
dos_prevention.tcp_src_eq_dst = false
dos_prevention.udp_src_eq_dst = false
dos_prevention.icmp_v4_ping_size = false
dos_prevention.icmp_v6_ping_size = false
